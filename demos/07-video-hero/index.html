<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Chen | 视频背景</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: system-ui, sans-serif; }
    
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      opacity: 0.4;
    }
    
    .content-overlay {
      background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%);
    }
  </style>
</head>
<body class="text-white">
  <!-- Video Background -->
  <video class="video-bg" autoplay muted loop playsinline>
    <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-network-connection-background-3162-large.mp4" type="video/mp4">
  </video>
  
  <div class="content-overlay min-h-screen">
    <!-- Nav -->
    <nav class="fixed top-0 left-0 right-0 z-50 px-8 py-6">
      <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div class="text-xl font-bold">Rock Chen</div>
        <div class="flex gap-6 text-sm">
          <a href="#" class="hover:text-blue-400 transition-colors">Work</a>
          <a href="#" class="hover:text-blue-400 transition-colors">About</a>
        </div>
      </div>
    </nav>

    <!-- Hero -->
    <section class="min-h-screen flex items-center justify-center px-6">
      <div class="text-center">
        <p class="text-blue-400 text-sm tracking-widest uppercase mb-4">Software Engineer</p>
        <h1 class="text-6xl md:text-8xl font-bold mb-6">
          Building the<br>Future
        </h1>
        <p class="text-xl text-gray-300 mb-10">
          从 0 到 1 打造产品，让技术创造真实价值
        </p>
        <a href="#" class="inline-block px-8 py-3 bg-blue-600 rounded-full font-medium hover:bg-blue-700 transition-colors">
          View Work
        </a>
      </div>
    </section>

    <!-- Work Section -->
    <section class="py-32 px-6">
      <div class="max-w-6xl mx-auto">
        <h2 class="text-4xl font-bold mb-12">Featured Work</h2>
        
        <div class="grid md:grid-cols-2 gap-8">
          <div class="bg-black/50 backdrop-blur rounded-2xl p-8 border border-white/10">
            <div class="text-5xl mb-4">🎙️</div>
            <h3 class="text-2xl font-bold mb-2">Voice Helper</h3>
            <p class="text-gray-400 mb-4">本地 AI 语音助手</p>
            <a href="#" class="text-blue-400 hover:text-blue-300">Learn more →</a>
          </div>
          
          <div class="bg-black/50 backdrop-blur rounded-2xl p-8 border border-white/10">
            <div class="text-5xl mb-4">🚀</div>
            <h3 class="text-2xl font-bold mb-2">More Coming</h3>
            <p class="text-gray-400 mb-4">持续更新中...</p>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
