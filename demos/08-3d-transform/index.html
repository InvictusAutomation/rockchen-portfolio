<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Chen | 3D 变换</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: system-ui, sans-serif; }
    
    .scene {
      perspective: 1000px;
    }
    
    .card-3d {
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }
    
    .card-3d:hover {
      transform: rotateY(10deg) rotateX(5deg);
    }
    
    .layer {
      position: absolute;
      inset: 0;
      transform: translateZ(20px);
    }
    
    .layer-back {
      transform: translateZ(-20px);
    }
  </style>
</head>
<body class="bg-gray-950 text-white overflow-x-hidden">
  <!-- Nav -->
  <nav class="fixed top-0 left-0 right-0 z-50 px-8 py-6">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <div class="text-xl font-bold">RC.</div>
      <div class="flex gap-6 text-sm">
        <a href="#" class="hover:text-cyan-400 transition-colors">Work</a>
        <a href="#" class="hover:text-cyan-400 transition-colors">About</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="min-h-screen flex items-center justify-center px-6">
    <div class="text-center">
      <p class="text-cyan-400 text-sm tracking-widest uppercase mb-4">Portfolio</p>
      <h1 class="text-7xl md:text-9xl font-bold mb-4">
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">Rock</span>
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-500">Chen</span>
      </h1>
      <p class="text-xl text-gray-400 mb-12">Engineer · Creator · Builder</p>
      <a href="#" class="inline-block px-8 py-3 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-full font-medium hover:opacity-90 transition-opacity">
        Explore Work
      </a>
    </div>
  </section>

  <!-- 3D Cards -->
  <section class="py-32 px-6">
    <div class="max-w-6xl mx-auto">
      <h2 class="text-4xl font-bold mb-12">Selected Projects</h2>
      
      <div class="grid md:grid-cols-3 gap-8">
        <!-- Card 1 -->
        <div class="scene h-96">
          <div class="card-3d bg-gray-900 rounded-2xl p-6 border border-gray-800 h-full relative overflow-hidden">
            <div class="layer-back absolute inset-0 bg-gradient-to-br from-cyan-500/20 to-blue-500/20"></div>
            <div class="relative z-10 h-full flex flex-col">
              <div class="text-4xl mb-4">🎙️</div>
              <h3 class="text-xl font-bold mb-2">Voice Helper</h3>
              <p class="text-gray-400 text-sm">本地 AI 语音助手</p>
              <div class="mt-auto">
                <span class="text-xs text-cyan-400">View Project →</span>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Card 2 -->
        <div class="scene h-96 md:mt-16">
          <div class="card-3d bg-gray-900 rounded-2xl p-6 border border-gray-800 h-full relative overflow-hidden">
            <div class="layer-back absolute inset-0 bg-gradient-to-br from-purple-500/20 to-pink-500/20"></div>
            <div class="relative z-10 h-full flex flex-col">
              <div class="text-4xl mb-4">🔧</div>
              <h3 class="text-xl font-bold mb-2">Skills</h3>
              <p class="text-gray-400 text-sm">Python, TypeScript, AI/ML</p>
              <div class="mt-auto">
                <span class="text-xs text-purple-400">Learn more →</span>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Card 3 -->
        <div class="scene h-96">
          <div class="card-3d bg-gray-900 rounded-2xl p-6 border border-gray-800 h-full relative overflow-hidden">
            <div class="layer-back absolute inset-0 bg-gradient-to-br from-green-500/20 to-cyan-500/20"></div>
            <div class="relative z-10 h-full flex flex-col">
              <div class="text-4xl mb-4">📧</div>
              <h3 class="text-xl font-bold mb-2">Contact</h3>
              <p class="text-gray-400 text-sm">Let's connect</p>
              <div class="mt-auto">
                <span class="text-xs text-green-400">Get in touch →</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
